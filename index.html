<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Light Switch</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0f0d0a;
      --bg-card: rgba(28, 24, 18, 0.85);
      --fg: #f5ead6;
      --muted: #8a7e6b;
      --accent: #f0a500;
      --accent-glow: rgba(240, 165, 0, 0.5);
      --accent-dim: rgba(240, 165, 0, 0.1);
      --border: rgba(240, 165, 0, 0.15);
      --input-bg: rgba(15, 13, 10, 0.6);
      --lamp-light: radial-gradient(ellipse 600px 500px at 50% 0%, var(--accent-glow), transparent 70%);
      --lamp-bulb: var(--accent);
      --lamp-filament: #fff8e1;
      --transition-speed: 0.8s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background var(--transition-speed) ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 80%, rgba(255,255,255,0.015) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.01) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .lamp-light {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 500px;
      background: var(--lamp-light);
      opacity: 1;
      transition: all var(--transition-speed) ease;
      pointer-events: none;
      z-index: 1;
    }

    .lamp-light.off { opacity: 0; }

    .main-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeUp 1s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === Lampu === */
    .lamp-wrapper {
      cursor: pointer;
      position: relative;
      transition: transform 0.3s ease;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    .lamp-wrapper:hover { transform: scale(1.05); }
    .lamp-wrapper:active { transform: scale(0.95); }

    .lamp-svg {
      width: 80px;
      height: 120px;
      filter: drop-shadow(0 0 20px var(--accent-glow));
      transition: filter var(--transition-speed) ease;
    }
    .lamp-svg.off { filter: drop-shadow(0 0 0px transparent); }

    .bulb-glass {
      fill: var(--lamp-bulb);
      opacity: 0.9;
      transition: fill var(--transition-speed) ease, opacity 0.4s ease;
    }
    .bulb-glass.off { opacity: 0.12; fill: #3a3632; }

    .filament {
      stroke: var(--lamp-filament);
      stroke-width: 1.5;
      fill: none;
      opacity: 1;
      transition: stroke var(--transition-speed) ease, opacity 0.4s ease;
    }
    .filament.off { opacity: 0.1; stroke: #5a5550; }

    .bulb-base { fill: #4a4540; }
    .bulb-base-ring { fill: #5a5550; }

    .lamp-wire {
      width: 2px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, #5a5550);
      margin: 0 auto;
      margin-bottom: -4px;
    }

    .lamp-hint {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      transition: color var(--transition-speed) ease;
      animation: hintPulse 3s ease-in-out infinite;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .color-indicators {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.15);
      transition: all 0.4s ease;
      opacity: 0.4;
    }
    .color-dot.active {
      opacity: 1;
      border-color: rgba(255,255,255,0.5);
      transform: scale(1.3);
      box-shadow: 0 0 8px currentColor;
    }

    /* === Card Login === */
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 4px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
      transition: border-color var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
      animation: fadeUp 1s ease 0.2s both;
    }
    .login-card:hover {
      box-shadow: 0 8px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .card-header { text-align: center; margin-bottom: 32px; }
    .card-header h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 28px;
      color: var(--fg);
      margin-bottom: 6px;
      transition: color var(--transition-speed) ease;
    }
    .card-header p {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
      transition: color var(--transition-speed) ease;
    }

    .form-group { margin-bottom: 20px; position: relative; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
      transition: color var(--transition-speed) ease;
    }

    .input-wrapper { position: relative; }
    .input-wrapper i.field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--muted);
      transition: color 0.3s ease;
      pointer-events: none;
    }
    .input-wrapper:focus-within i.field-icon { color: var(--accent); }

    .form-input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--fg);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: all 0.3s ease;
    }
    .form-input::placeholder { color: rgba(138, 126, 107, 0.5); }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      transition: color 0.3s ease;
    }
    .toggle-password:hover { color: var(--accent); }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      transition: color var(--transition-speed) ease;
    }
    .remember-me input[type="checkbox"] { display: none; }
    .custom-checkbox {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid var(--border);
      background: var(--input-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .custom-checkbox i {
      font-size: 10px;
      color: var(--bg);
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s ease;
    }
    .remember-me input:checked + .custom-checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }
    .remember-me input:checked + .custom-checkbox i {
      opacity: 1;
      transform: scale(1);
    }

    .forgot-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.3s ease;
    }
    .forgot-link:hover { opacity: 0.75; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:active { transform: translateY(0); }
    .btn-login .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: rippleAnim 0.6s ease-out;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .social-buttons { display: flex; gap: 12px; }
    .btn-social {
      flex: 1;
      padding: 12px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--fg);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-social span { font-size: 13px; font-weight: 500; }
    .btn-social:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px);
    }

    .card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
    }
    .card-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.3s ease;
    }
    .card-footer a:hover { opacity: 0.75; }

    /* === Modal Overlay === */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.35s ease;
      padding: 16px;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0;
      width: 100%;
      max-width: 420px;
      max-height: 85vh;
      overflow: hidden;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      transform: scale(0.9) translateY(20px);
      transition: transform 0.35s ease;
    }
    .modal-overlay.active .modal-box {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      padding: 24px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-provider-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .modal-provider-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      flex-shrink: 0;
    }
    .modal-provider-icon.google { background: linear-gradient(135deg, #ea4335, #fbbc05, #34a853, #4285f4); }
    .modal-provider-icon.github { background: #24292e; }
    .modal-provider-icon.apple { background: #000; border: 1px solid rgba(255,255,255,0.15); }

    .modal-provider-text h2 {
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--fg);
    }
    .modal-provider-text p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .modal-close:hover {
      color: var(--fg);
      border-color: var(--accent);
    }

    .modal-body {
      padding: 20px 28px 28px;
      overflow-y: auto;
      max-height: calc(85vh - 90px);
    }

    .modal-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    /* Akun item */
    .account-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-bottom: 6px;
      position: relative;
    }
    .account-item:hover {
      background: var(--accent-dim);
      border-color: var(--border);
    }
    .account-item:active {
      transform: scale(0.98);
    }

    .account-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .account-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .account-info { flex: 1; min-width: 0; }
    .account-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .account-email {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .account-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s ease;
      opacity: 0;
    }
    .account-item:hover .account-check {
      opacity: 1;
    }
    .account-check i {
      font-size: 10px;
      color: var(--bg);
    }
    .account-item.selected .account-check {
      opacity: 1;
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Badge akun default */
    .account-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 2px 7px;
      border-radius: 6px;
      background: var(--accent-dim);
      color: var(--accent);
      position: absolute;
      top: 8px;
      right: 50px;
    }

    /* Tombol use another account */
    .btn-another {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1.5px dashed var(--border);
      border-radius: 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.25s ease;
      margin-top: 10px;
    }
    .btn-another:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Input akun baru di modal */
    .new-account-form {
      display: none;
      margin-top: 14px;
      animation: slideDown 0.3s ease;
    }
    .new-account-form.active { display: block; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .new-account-input {
      width: 100%;
      padding: 13px 16px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--fg);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: all 0.3s ease;
      margin-bottom: 10px;
    }
    .new-account-input::placeholder { color: rgba(138, 126, 107, 0.5); }
    .new-account-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .new-account-actions {
      display: flex;
      gap: 10px;
    }
    .btn-new-cancel {
      flex: 1;
      padding: 11px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-new-cancel:hover { color: var(--fg); border-color: var(--muted); }

    .btn-new-continue {
      flex: 1;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: var(--bg);
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-new-continue:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    /* Loading spinner di akun item */
    .account-loading {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .account-loading.active {
      opacity: 1;
      visibility: visible;
    }
    .account-loading .spinner {
      width: 22px;
      height: 22px;
      border: 2.5px solid rgba(255,255,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* === Toast === */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      transform: translateX(120%);
      animation: toastIn 0.4s ease forwards;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 340px;
    }
    .toast.success { background: rgba(34, 197, 94, 0.92); }
    .toast.error { background: rgba(239, 68, 68, 0.92); }
    .toast.info { background: rgba(30, 30, 30, 0.92); border: 1px solid var(--border); color: var(--fg); }

    @keyframes toastIn { to { transform: translateX(0); } }
    @keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }

    /* === Partikel === */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      10% { opacity: 0.6; transform: translateY(90vh) scale(1); }
      90% { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-10vh) scale(0.5); }
    }

    /* === Welcome screen === */
    .welcome-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s ease;
    }
    .welcome-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .welcome-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--accent);
      box-shadow: 0 0 40px var(--accent-glow);
      margin-bottom: 24px;
      animation: welcomePop 0.6s ease 0.3s both;
    }
    .welcome-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    @keyframes welcomePop {
      from { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.15); }
      to { transform: scale(1); opacity: 1; }
    }
    .welcome-name {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 900;
      color: var(--fg);
      animation: fadeUp 0.6s ease 0.5s both;
    }
    .welcome-email {
      font-size: 15px;
      color: var(--muted);
      margin-top: 6px;
      animation: fadeUp 0.6s ease 0.65s both;
    }
    .welcome-provider {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 8px 18px;
      border-radius: 30px;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
      animation: fadeUp 0.6s ease 0.8s both;
    }
    .welcome-back {
      margin-top: 32px;
      padding: 12px 28px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      animation: fadeUp 0.6s ease 0.95s both;
      transition: all 0.3s ease;
    }
    .welcome-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    /* === Responsif === */
    @media (max-width: 480px) {
      .login-card { margin: 0 16px; padding: 32px 24px; }
      .card-header h1 { font-size: 24px; }
      .btn-social span { display: none; }
      .modal-body { padding: 16px 20px 24px; }
      .modal-header { padding: 20px 20px 0; }
      .welcome-name { font-size: 26px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div class="lamp-light" id="lampLight"></div>
  <div class="particles" id="particles"></div>
  <div class="toast-container" id="toastContainer"></div>

  <!-- Welcome overlay -->
  <div class="welcome-overlay" id="welcomeOverlay">
    <div class="welcome-avatar" id="welcomeAvatar"></div>
    <div class="welcome-name" id="welcomeName"></div>
    <div class="welcome-email" id="welcomeEmail"></div>
    <div class="welcome-provider" id="welcomeProvider"></div>
    <button class="welcome-back" id="welcomeBack">Kembali ke Login</button>
  </div>

  <!-- Modal Pilih Akun -->
  <div class="modal-overlay" id="accountModal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-provider-info">
          <div class="modal-provider-icon" id="modalProviderIcon">
            <i class="fa-brands fa-google"></i>
          </div>
          <div class="modal-provider-text">
            <h2 id="modalTitle">Masuk dengan Google</h2>
            <p id="modalSubtitle">Pilih akun untuk melanjutkan</p>
          </div>
        </div>
        <button class="modal-close" id="modalClose" aria-label="Tutup">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-section-label">Akun tersedia</div>
        <div id="accountList"></div>
        <button class="btn-another" id="btnAnotherAccount">
          <i class="fa-solid fa-plus"></i> Gunakan akun lain
        </button>
        <div class="new-account-form" id="newAccountForm">
          <input type="email" class="new-account-input" id="newAccountEmail" placeholder="Masukkan alamat email">
          <div class="new-account-actions">
            <button class="btn-new-cancel" id="btnNewCancel">Batal</button>
            <button class="btn-new-continue" id="btnNewContinue">Lanjutkan</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <main class="main-container">
    <div class="lamp-wire"></div>

    <div class="lamp-wrapper" id="lampSwitch" role="button" tabindex="0" aria-label="Tekan untuk mengubah warna lampu">
      <svg class="lamp-svg" id="lampSvg" viewBox="0 0 80 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="bulb-glass" id="bulbGlass" d="M28 55 C28 35, 52 35, 52 55 C52 65, 48 70, 46 74 L34 74 C32 70, 28 65, 28 55Z" />
        <path class="filament" id="filament" d="M36 62 C36 55, 40 50, 40 50 C40 50, 44 55, 44 62" />
        <path class="filament" id="filament2" d="M38 64 C38 58, 40 54, 40 54 C40 54, 42 58, 42 64" />
        <rect class="bulb-base" x="32" y="74" width="16" height="4" rx="1" />
        <rect class="bulb-base-ring" x="33" y="79" width="14" height="3" rx="1" />
        <rect class="bulb-base" x="34" y="83" width="12" height="3" rx="1.5" />
        <rect class="bulb-base-ring" x="35" y="87" width="10" height="3" rx="1.5" />
        <circle class="bulb-base" cx="40" cy="93" r="4" />
      </svg>
    </div>

    <div class="color-indicators" id="colorIndicators">
      <div class="color-dot active" style="background:#f0a500; color:#f0a500;" data-index="0"></div>
      <div class="color-dot" style="background:#10b981; color:#10b981;" data-index="1"></div>
      <div class="color-dot" style="background:#f43f5e; color:#f43f5e;" data-index="2"></div>
      <div class="color-dot" style="background:#06b6d4; color:#06b6d4;" data-index="3"></div>
      <div class="color-dot" style="background:#fb923c; color:#fb923c;" data-index="4"></div>
    </div>

    <p class="lamp-hint">Tekan lampu untuk ganti suasana</p>

    <section class="login-card">
      <div class="card-header">
        <h1>Selamat Datang</h1>
        <p>Masuk ke akun Anda untuk melanjutkan</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-envelope field-icon"></i>
            <input type="email" id="email" class="form-input" placeholder="nama@email.com" autocomplete="email" required>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Kata Sandi</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock field-icon" style="font-size:13px;"></i>
            <input type="password" id="password" class="form-input" placeholder="Masukkan kata sandi" autocomplete="current-password" required>
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Tampilkan kata sandi">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember">
            <span class="custom-checkbox"><i class="fa-solid fa-check"></i></span>
            Ingat saya
          </label>
          <a href="#" class="forgot-link" id="forgotLink">Lupa sandi?</a>
        </div>
        <button type="submit" class="btn-login" id="btnLogin">Masuk</button>
      </form>

      <div class="divider"><span>atau</span></div>

      <div class="social-buttons">
        <button type="button" class="btn-social" data-provider="google" aria-label="Login dengan Google">
          <i class="fa-brands fa-google"></i>
          <span>Google</span>
        </button>
        <button type="button" class="btn-social" data-provider="github" aria-label="Login dengan GitHub">
          <i class="fa-brands fa-github"></i>
          <span>GitHub</span>
        </button>
        <button type="button" class="btn-social" data-provider="apple" aria-label="Login dengan Apple">
          <i class="fa-brands fa-apple"></i>
          <span>Apple</span>
        </button>
      </div>

      <div class="card-footer">
        Belum punya akun? <a href="#" id="signupLink">Daftar sekarang</a>
      </div>
    </section>
  </main>

  <script>
    // === Data akun per provider ===
    const providerAccounts = {
      google: {
        title: 'Masuk dengan Google',
        subtitle: 'Pilih akun Google untuk melanjutkan',
        iconClass: 'fa-brands fa-google',
        iconBg: 'google',
        accounts: [
          { name: 'Ahmad Fauzi', email: 'ahmad.fauzi@gmail.com', avatar: 'https://picsum.photos/seed/ahmad99/100/100.jpg', isDefault: true },
          { name: 'Siti Nurhaliza', email: 'siti.nur@gmail.com', avatar: 'https://picsum.photos/seed/siti77/100/100.jpg', isDefault: false },
          { name: 'Budi Santoso', email: 'budi.santoso@gmail.com', avatar: 'https://picsum.photos/seed/budi42/100/100.jpg', isDefault: false },
          { name: 'Dewi Lestari', email: 'dewi.lestari@gmail.com', avatar: 'https://picsum.photos/seed/dewi55/100/100.jpg', isDefault: false }
        ]
      },
      github: {
        title: 'Masuk dengan GitHub',
        subtitle: 'Pilih akun GitHub untuk melanjutkan',
        iconClass: 'fa-brands fa-github',
        iconBg: 'github',
        accounts: [
          { name: 'ahmadfauzi', email: 'ahmad@devstudio.io', avatar: 'https://picsum.photos/seed/ahmad99/100/100.jpg', isDefault: true },
          { name: 'sitinurdev', email: 'siti@opensource.dev', avatar: 'https://picsum.photos/seed/siti77/100/100.jpg', isDefault: false },
          { name: 'budisantoso', email: 'budi@codeworks.id', avatar: 'https://picsum.photos/seed/budi42/100/100.jpg', isDefault: false }
        ]
      },
      apple: {
        title: 'Masuk dengan Apple',
        subtitle: 'Pilih akun Apple untuk melanjutkan',
        iconClass: 'fa-brands fa-apple',
        iconBg: 'apple',
        accounts: [
          { name: 'Ahmad F', email: 'ahmad.f@icloud.com', avatar: null, isDefault: true },
          { name: 'S N', email: 'siti.n@icloud.com', avatar: null, isDefault: false },
          { name: 'Budi S', email: 'budi.s@icloud.com', avatar: null, isDefault: false }
        ]
      }
    };

    // === Tema warna ===
    const themes = [
      { name:'Amber', bg:'#0f0d0a', bgCard:'rgba(28,24,18,0.85)', fg:'#f5ead6', muted:'#8a7e6b', accent:'#f0a500', accentGlow:'rgba(240,165,0,0.5)', accentDim:'rgba(240,165,0,0.1)', border:'rgba(240,165,0,0.15)', inputBg:'rgba(15,13,10,0.6)', lampLight:'radial-gradient(ellipse 600px 500px at 50% 0%,rgba(240,165,0,0.5),transparent 70%)', bulbColor:'#f0a500', filamentColor:'#fff8e1' },
      { name:'Emerald', bg:'#060f0b', bgCard:'rgba(10,28,20,0.85)', fg:'#d6f5e8', muted:'#5f8a72', accent:'#10b981', accentGlow:'rgba(16,185,129,0.5)', accentDim:'rgba(16,185,129,0.1)', border:'rgba(16,185,129,0.15)', inputBg:'rgba(6,15,11,0.6)', lampLight:'radial-gradient(ellipse 600px 500px at 50% 0%,rgba(16,185,129,0.5),transparent 70%)', bulbColor:'#10b981', filamentColor:'#d1fae5' },
      { name:'Rose', bg:'#0f0608', bgCard:'rgba(28,12,16,0.85)', fg:'#f5d6db', muted:'#8a5f68', accent:'#f43f5e', accentGlow:'rgba(244,63,94,0.5)', accentDim:'rgba(244,63,94,0.1)', border:'rgba(244,63,94,0.15)', inputBg:'rgba(15,6,8,0.6)', lampLight:'radial-gradient(ellipse 600px 500px at 50% 0%,rgba(244,63,94,0.5),transparent 70%)', bulbColor:'#f43f5e', filamentColor:'#ffe4e6' },
      { name:'Cyan', bg:'#060d0f', bgCard:'rgba(10,22,28,0.85)', fg:'#d6eef5', muted:'#5f7e8a', accent:'#06b6d4', accentGlow:'rgba(6,182,212,0.5)', accentDim:'rgba(6,182,212,0.1)', border:'rgba(6,182,212,0.15)', inputBg:'rgba(6,13,15,0.6)', lampLight:'radial-gradient(ellipse 600px 500px at 50% 0%,rgba(6,182,212,0.5),transparent 70%)', bulbColor:'#06b6d4', filamentColor:'#cffafe' },
      { name:'Coral', bg:'#0f0a06', bgCard:'rgba(28,18,10,0.85)', fg:'#f5e8d6', muted:'#8a745f', accent:'#fb923c', accentGlow:'rgba(251,146,60,0.5)', accentDim:'rgba(251,146,60,0.1)', border:'rgba(251,146,60,0.15)', inputBg:'rgba(15,10,6,0.6)', lampLight:'radial-gradient(ellipse 600px 500px at 50% 0%,rgba(251,146,60,0.5),transparent 70%)', bulbColor:'#fb923c', filamentColor:'#ffedd5' }
    ];

    let currentTheme = 0;
    let isLampOn = true;
    let currentProvider = null;
    let selectedAccountIndex = -1;

    // === Referensi DOM ===
    const root = document.documentElement;
    const lampSwitch = document.getElementById('lampSwitch');
    const lampSvg = document.getElementById('lampSvg');
    const bulbGlass = document.getElementById('bulbGlass');
    const filament = document.getElementById('filament');
    const filament2 = document.getElementById('filament2');
    const lampLight = document.getElementById('lampLight');
    const colorDots = document.querySelectorAll('.color-dot');
    const toastContainer = document.getElementById('toastContainer');
    const accountModal = document.getElementById('accountModal');
    const modalProviderIcon = document.getElementById('modalProviderIcon');
    const modalTitle = document.getElementById('modalTitle');
    const modalSubtitle = document.getElementById('modalSubtitle');
    const accountList = document.getElementById('accountList');
    const newAccountForm = document.getElementById('newAccountForm');
    const newAccountEmail = document.getElementById('newAccountEmail');
    const welcomeOverlay = document.getElementById('welcomeOverlay');

    // === Fungsi utilitas ===
    function getInitials(name) {
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function getAvatarColor(name) {
      const colors = ['#f0a500','#10b981','#f43f5e','#06b6d4','#fb923c','#8b5cf6','#ec4899','#14b8a6'];
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return colors[Math.abs(hash) % colors.length];
    }

    // === Terapkan tema ===
    function applyTheme(index) {
      const t = themes[index];
      const s = document.documentElement.style;
      s.setProperty('--bg', t.bg);
      s.setProperty('--bg-card', t.bgCard);
      s.setProperty('--fg', t.fg);
      s.setProperty('--muted', t.muted);
      s.setProperty('--accent', t.accent);
      s.setProperty('--accent-glow', t.accentGlow);
      s.setProperty('--accent-dim', t.accentDim);
      s.setProperty('--border', t.border);
      s.setProperty('--input-bg', t.inputBg);
      s.setProperty('--lamp-light', t.lampLight);
      s.setProperty('--lamp-bulb', t.bulbColor);
      s.setProperty('--lamp-filament', t.filamentColor);
      colorDots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    }

    // === Toggle lampu ===
    function toggleLamp() {
      if (isLampOn) {
        isLampOn = false;
        bulbGlass.classList.add('off');
        filament.classList.add('off');
        filament2.classList.add('off');
        lampSvg.classList.add('off');
        lampLight.classList.add('off');
        showToast('<i class="fa-solid fa-lightbulb"></i> Lampu dimatikan', 'info');
      } else {
        currentTheme = (currentTheme + 1) % themes.length;
        isLampOn = true;
        applyTheme(currentTheme);
        bulbGlass.classList.remove('off');
        filament.classList.remove('off');
        filament2.classList.remove('off');
        lampSvg.classList.remove('off');
        lampLight.classList.remove('off');
        showToast(`<i class="fa-solid fa-palette"></i> Suasana ${themes[currentTheme].name}`, 'info');
      }
    }

    lampSwitch.addEventListener('click', toggleLamp);
    lampSwitch.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleLamp(); }
    });

    // === Toast ===
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = message;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'toastOut 0.4s ease forwards';
        setTimeout(() => toast.remove(), 400);
      }, 2800);
    }

    // === Modal akun ===
    function openAccountModal(provider) {
      currentProvider = provider;
      selectedAccountIndex = -1;
      const data = providerAccounts[provider];

      // Set header modal
      modalProviderIcon.className = `modal-provider-icon ${data.iconBg}`;
      modalProviderIcon.innerHTML = `<i class="${data.iconClass}"></i>`;
      modalTitle.textContent = data.title;
      modalSubtitle.textContent = data.subtitle;

      // Render daftar akun
      accountList.innerHTML = '';
      data.accounts.forEach((acc, idx) => {
        const item = document.createElement('div');
        item.className = 'account-item';
        item.setAttribute('role', 'button');
        item.setAttribute('tabindex', '0');
        item.setAttribute('data-index', idx);

        // Avatar
        let avatarHTML;
        if (acc.avatar) {
          avatarHTML = `<img src="${acc.avatar}" alt="${acc.name}" loading="lazy">`;
        } else {
          // Apple: tampilkan inisial
          avatarHTML = `<span>${getInitials(acc.name)}</span>`;
        }

        item.innerHTML = `
          <div class="account-avatar" style="background:${acc.avatar ? 'transparent' : getAvatarColor(acc.name)}">${avatarHTML}</div>
          <div class="account-info">
            <div class="account-name">${acc.name}</div>
            <div class="account-email">${acc.email}</div>
          </div>
          ${acc.isDefault ? '<span class="account-badge">Default</span>' : ''}
          <div class="account-check"><i class="fa-solid fa-check"></i></div>
          <div class="account-loading"><div class="spinner"></div></div>
        `;

        // Klik akun
        item.addEventListener('click', () => selectAccount(idx, item));
        item.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectAccount(idx, item); }
        });

        accountList.appendChild(item);
      });

      // Reset form akun baru
      newAccountForm.classList.remove('active');
      newAccountEmail.value = '';

      // Tampilkan modal
      accountModal.classList.add('active');
    }

    function closeAccountModal() {
      accountModal.classList.remove('active');
      currentProvider = null;
    }

    function selectAccount(index, element) {
      // Tandai selected
      document.querySelectorAll('.account-item').forEach(el => el.classList.remove('selected'));
      element.classList.add('selected');

      // Tampilkan loading
      const loading = element.querySelector('.account-loading');
      loading.classList.add('active');

      const data = providerAccounts[currentProvider];
      const acc = data.accounts[index];

      // Simulasi autentikasi 1.2 detik
      setTimeout(() => {
        loading.classList.remove('active');
        closeAccountModal();
        setTimeout(() => showWelcome(acc, currentProvider), 400);
      }, 1200);
    }

    // === Event tombol sosial ===
    document.querySelectorAll('.btn-social[data-provider]').forEach(btn => {
      btn.addEventListener('click', () => {
        const provider = btn.getAttribute('data-provider');
        openAccountModal(provider);
      });
    });

    // Tutup modal
    document.getElementById('modalClose').addEventListener('click', closeAccountModal);
    accountModal.addEventListener('click', (e) => {
      if (e.target === accountModal) closeAccountModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && accountModal.classList.contains('active')) closeAccountModal();
    });

    // === Gunakan akun lain ===
    document.getElementById('btnAnotherAccount').addEventListener('click', () => {
      newAccountForm.classList.add('active');
      newAccountEmail.focus();
    });
    document.getElementById('btnNewCancel').addEventListener('click', () => {
      newAccountForm.classList.remove('active');
      newAccountEmail.value = '';
    });
    document.getElementById('btnNewContinue').addEventListener('click', () => {
      const email = newAccountEmail.value.trim();
      if (!email) {
        showToast('<i class="fa-solid fa-circle-xmark"></i> Email tidak boleh kosong', 'error');
        return;
      }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showToast('<i class="fa-solid fa-circle-xmark"></i> Format email tidak valid', 'error');
        return;
      }

      // Buat akun baru dari email yang dimasukkan
      const namePart = email.split('@')[0].replace(/[._]/g, ' ');
      const displayName = namePart.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      const newAcc = { name: displayName, email: email, avatar: null, isDefault: false };

      newAccountEmail.value = '';
      newAccountForm.classList.remove('active');
      closeAccountModal();

      setTimeout(() => showWelcome(newAcc, currentProvider), 400);
    });
    newAccountEmail.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btnNewContinue').click();
    });

    // === Welcome screen ===
    function showWelcome(account, provider) {
      const providerLabels = { google: 'Google', github: 'GitHub', apple: 'Apple' };
      const providerIcons = { google: 'fa-brands fa-google', github: 'fa-brands fa-github', apple: 'fa-brands fa-apple' };

      // Set avatar
      const avatarEl = document.getElementById('welcomeAvatar');
      if (account.avatar) {
        avatarEl.innerHTML = `<img src="${account.avatar}" alt="${account.name}">`;
      } else {
        avatarEl.style.background = getAvatarColor(account.name);
        avatarEl.style.display = 'flex';
        avatarEl.style.alignItems = 'center';
        avatarEl.style.justifyContent = 'center';
        avatarEl.style.fontSize = '32px';
        avatarEl.style.fontWeight = '700';
        avatarEl.style.color = '#fff';
        avatarEl.innerHTML = getInitials(account.name);
      }

      document.getElementById('welcomeName').textContent = account.name;
      document.getElementById('welcomeEmail').textContent = account.email;
      document.getElementById('welcomeProvider').innerHTML = `<i class="${providerIcons[provider]}"></i> Login via ${providerLabels[provider]}`;

      welcomeOverlay.classList.add('active');
      showToast(`<i class="fa-solid fa-circle-check"></i> Login berhasil!`, 'success');
    }

    document.getElementById('welcomeBack').addEventListener('click', () => {
      welcomeOverlay.classList.remove('active');
    });

    // === Toggle password ===
    document.getElementById('togglePassword').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const isPw = pw.type === 'password';
      pw.type = isPw ? 'text' : 'password';
      document.getElementById('togglePassword').querySelector('i').className = isPw ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
    });

    // === Ripple ===
    document.getElementById('btnLogin').addEventListener('click', function(e) {
      const btn = this;
      const rect = btn.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });

    // === Submit form ===
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value.trim();

      if (!email) { showToast('<i class="fa-solid fa-circle-xmark"></i> Email tidak boleh kosong', 'error'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('<i class="fa-solid fa-circle-xmark"></i> Format email tidak valid', 'error'); return; }
      if (!pw) { showToast('<i class="fa-solid fa-circle-xmark"></i> Kata sandi tidak boleh kosong', 'error'); return; }
      if (pw.length < 6) { showToast('<i class="fa-solid fa-circle-xmark"></i> Kata sandi minimal 6 karakter', 'error'); return; }

      const btn = document.getElementById('btnLogin');
      btn.textContent = 'Memproses...';
      btn.disabled = true;
      btn.style.opacity = '0.7';

      setTimeout(() => {
        btn.textContent = 'Masuk';
        btn.disabled = false;
        btn.style.opacity = '1';
        const name = email.split('@')[0].replace(/[._]/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        showWelcome({ name, email, avatar: null }, 'google');
      }, 1500);
    });

    // Link footer
    document.getElementById('forgotLink').addEventListener('click', (e) => {
      e.preventDefault();
      showToast('<i class="fa-solid fa-paper-plane"></i> Link reset kata sandi telah dikirim ke email Anda', 'success');
    });
    document.getElementById('signupLink').addEventListener('click', (e) => {
      e.preventDefault();
      showToast('<i class="fa-solid fa-info-circle"></i> Halaman pendaftaran segera hadir', 'info');
    });

    // === Partikel ===
    (function createParticles() {
      const c = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (8 + Math.random() * 12) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        const s = (2 + Math.random() * 3) + 'px';
        p.style.width = s;
        p.style.height = s;
        c.appendChild(p);
      }
    })();

    // === Parallax cahaya ===
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 10;
      lampLight.style.transform = `translateX(calc(-50% + ${x}px)) translateY(${y}px)`;
    });
  </script>
</body>
</html>
